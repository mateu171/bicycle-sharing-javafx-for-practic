name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install WiX Toolset
        run: choco install wixtoolset --yes

      - name: Build fat jar
        run: mvn clean package -DskipTests

      - name: Build MSI installer
        run: |
          jpackage `
            --type msi `
            --name "BicycleSharing" `
            --app-version "1.0.0" `
            --vendor "Serhii" `
            --description "Bicycle Sharing System" `
            --input target `
            --main-jar BicycleSharing-fat.jar `
            --main-class org.example.bicyclesharing.Launcher `
            --dest dist `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: BicycleSharing-Windows
          path: dist/*.msi
          compression-level: 0

  build-macos-intel:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build fat jar
        run: mvn clean package -DskipTests

      - name: Build Intel DMG installer
        run: |
          jpackage \
            --type dmg \
            --name "BicycleSharing" \
            --app-version "1.0.0" \
            --vendor "Serhii" \
            --input target \
            --main-jar BicycleSharing-fat.jar \
            --main-class org.example.bicyclesharing.Launcher \
            --dest dist \
            --mac-package-name "BicycleSharing" \
            --mac-package-identifier "org.example.bicyclesharing"

      - name: Rename Intel installer
        run: |
          mv dist/*.dmg dist/BicycleSharing-macOS-Intel.dmg

      - name: Upload Intel macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: BicycleSharing-macOS-Intel
          path: dist/BicycleSharing-macOS-Intel.dmg
          compression-level: 0

  build-macos-apple-silicon:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build fat jar
        run: mvn clean package -DskipTests

      - name: Build Apple Silicon DMG installer
        run: |
          jpackage \
            --type dmg \
            --name "BicycleSharing" \
            --app-version "1.0.0" \
            --vendor "Serhii" \
            --input target \
            --main-jar BicycleSharing-fat.jar \
            --main-class org.example.bicyclesharing.Launcher \
            --dest dist \
            --mac-package-name "BicycleSharing" \
            --mac-package-identifier "org.example.bicyclesharing"

      - name: Rename Apple Silicon installer
        run: |
          mv dist/*.dmg dist/BicycleSharing-macOS-AppleSilicon.dmg

      - name: Upload Apple Silicon installer
        uses: actions/upload-artifact@v4
        with:
          name: BicycleSharing-macOS-AppleSilicon
          path: dist/BicycleSharing-macOS-AppleSilicon.dmg
          compression-level: 0

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build fat jar
        run: mvn clean package -DskipTests

      - name: Build DEB installer
        run: |
          jpackage \
            --type deb \
            --name "bicyclesharing" \
            --app-version "1.0.0" \
            --vendor "Serhii" \
            --input target \
            --main-jar BicycleSharing-fat.jar \
            --main-class org.example.bicyclesharing.Launcher \
            --dest dist \
            --linux-package-name "bicyclesharing" \
            --linux-app-category "Education" \
            --linux-shortcut

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: BicycleSharing-Linux
          path: dist/*.deb
          compression-level: 0

  publish-release:
    needs:
      - build-windows
      - build-macos-intel
      - build-macos-apple-silicon
      - build-linux

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Show downloaded files
        run: ls -la installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BicycleSharing ${{ github.ref_name }}"
          body: |
            ## BicycleSharing ${{ github.ref_name }}

            Інсталятори для різних операційних систем:

            | Платформа | Файл |
            |---|---|
            | Windows | `.msi` |
            | macOS Intel | `BicycleSharing-macOS-Intel.dmg` |
            | macOS Apple Silicon | `BicycleSharing-macOS-AppleSilicon.dmg` |
            | Linux Ubuntu/Debian | `.deb` |

          files: installers/*
          draft: false
          prerelease: false